<!DOCTYPE html>
<html lang="te">
<head>
    <meta charset="UTF-8">
    <title>శ్రీ అయ్యప్ప పూజా సామాగ్రి</title>
    <link rel="stylesheet" href="main.css">
</head>
<body>

<header>
    శ్రీ అయ్యప్ప పూజా సామాగ్రి
</header>

<div class="info">
    <p>All pooja items available at best price</p>
    <p>Quality products for daily and special poojas</p>
    <p>Location: Ramabhadrapuram, Vizianagaram</p>
    <button>View Full Catalog</button>
</div>

<div class="search">
    <input type="text" placeholder="Search products..." onkeyup="searchProducts(this.value)">
</div>

<div class="categories">
    <button onclick="filterCategory('all')">All</button>
    <button onclick="filterCategory('kit')">Pooja Kits</button>
    <button onclick="filterCategory('powder')">Kumkum</button>
    <button onclick="filterCategory('oil')">Oils</button>
    <button onclick="filterCategory('ayyappa')">Ayyappa</button>
</div>

<div class="products" id="productList"></div>

<div class="cart">
    Checkout (₹<span id="total">0</span>)
    <br>
    <button onclick="checkout()">Order via WhatsApp</button>
</div>

<script src="main.js"></script>
</body>
</html>
